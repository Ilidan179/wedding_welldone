<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ляйсан & Вильдан</title>

<!-- Шрифты -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  color: #5a4a4a;
  background: #faf7f6;
  text-align: center;
}

/* HERO */
.hero {
  height: 100vh;
  background: url('assets/photos/bg.jpg') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay {
  background: rgba(255,255,255,0.7);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  animation: fadeIn 1.5s ease;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
}

.date {
  margin: 10px 0 20px;
  font-size: 18px;
}

/* BUTTONS */
.btn {
  background: #b76e79;
  color: white;
  border: none;
  padding: 12px 20px;
  margin: 5px;
  border-radius: 20px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.btn.light {
  background: #e6cfcf;
  color: #5a4a4a;
}

/* PHOTOS */
.photos {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 60px 0;
}

.photo-card {
  width: 140px;
  background: white;
  padding: 10px;
  border-radius: 10px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  animation: float 4s ease-in-out infinite;
}

.photo-card img {
  width: 100%;
  border-radius: 8px;
}

.left {
  transform: rotate(-8deg);
}

.right {
  transform: rotate(8deg);
}

.heart {
  font-size: 24px;
  margin: 0 15px;
  color: #b76e79;
}

/* TEXT */
.text {
  padding: 40px 20px;
}

.details {
  background: #fff;
  padding: 30px;
  border-radius: 20px;
  margin: 20px;
}

/* FOOTER */
.footer {
  margin: 60px 0;
}

/* SCROLL ANIMATION */
.reveal {
  opacity: 0;
  transform: translateY(40px);
  transition: 1s;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px);}
  to { opacity: 1; transform: translateY(0);}
}

@keyframes float {
  0% { transform: translateY(0px);}
  50% { transform: translateY(-10px);}
  100% { transform: translateY(0px);}
}

/* MOBILE
max-width: 500px {
  h1 { font-size: 28px; }
  .photo-card { width: 110px; }
} */
</style>
</head>

<body>

<!-- Музыка -->
<audio id="music" src="assets/music/song.mp3"></audio>

<!-- HERO -->
<section class="hero">
  <div class="overlay">
    <h1>Ляйсан & Вильдан</h1>
    <p class="date">18.07.2026</p>
    <button onclick="toggleMusic()" class="btn">Включить музыку</button>
    

    <button onclick="scrollToContent()" class="btn light">Открыть приглашение</button>
  </div>
</section>

<!-- PHOTOS -->
<section class="photos reveal">
  <div class="photo-card left">
    <img src="assets/photos/Ляйсан_уменьш.png">
  </div>
  <div class="heart">❤</div>
  <div class="photo-card right">
    <img src="assets/photos/photo2.jpg">
  </div>
</section>

<!-- TEXT -->
<section class="text reveal">
  <h2>Мы приглашаем вас на нашу свадьбу</h2>
  <p>Будем счастливы разделить этот день с вами</p>
</section>

<!-- DETAILS -->
<section class="details reveal">
  <p>📍 Место: Ресторан “Лесной”</p>
  <p>🕒 Время: 15:00</p>
  <p>👗 Дресс-код: светлые оттенки</p>
</section>

<!-- FOOTER -->
<section class="footer reveal">
  <h2>Ждём вас ❤</h2>
</section>

<script>
function toggleMusic() {
  const music = document.getElementById("music");
  music.paused ? music.play() : music.pause();
}

function scrollToContent() {
  window.scrollTo({
    top: window.innerHeight,
    behavior: "smooth"
  });
}

// reveal animation
const reveals = document.querySelectorAll('.reveal');

window.addEventListener('scroll', () => {
  reveals.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      el.classList.add('active');
    }
  });
});
</script>

</body>
</html>
